title: china-network-probe · 海外回国网络访问检测工具
description: >-
  开源命令行工具，检测海外访问中国大陆主流服务（B站、爱奇艺、网易云音乐、国服游戏、微信、支付宝）的延迟、可达性、DNS 解析与出口 IP 归属地。
  适用于海外华人、留学生排查回国访问问题，也可用于验证回国 VPN / 回国加速器的实际效果。
url: "https://999021-dev.github.io"
baseurl: "/china-network-probe"

